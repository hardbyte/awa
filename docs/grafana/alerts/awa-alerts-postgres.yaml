# Grafana unified-alerting rules for an awa fleet whose only observability
# source is the Postgres schema (no OTel collector deployed). Rules
# correspond to the panels on awa-dashboard-postgres.json — import via
# Grafana provisioning just like the Prometheus variant, substituting
# DS_POSTGRES with the uid of your Awa Postgres datasource.
#
# Same thresholds and annotations as the Prometheus variant where the
# metric is available. The "throughput collapse" rule is omitted because
# it needs a trailing 1-hour baseline that the raw SQL would re-compute
# every minute — users running Postgres-only observability should plug
# in their own rate-over-rate query or rely on "queue lag high" and
# "error rate elevated" together, which cover the same signal at steady
# state.

apiVersion: 1
groups:
  - orgId: 1
    name: awa-postgres
    folder: awa
    interval: 1m
    rules:

      - uid: awa_pg_queue_lag_high
        title: "awa queue lag > 5 minutes (Postgres)"
        condition: "C"
        for: 2m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          owner: awa
        annotations:
          summary: "Queue {{ $labels.queue }} has an available job older than 5 minutes"
          description: |
            Oldest `available` job on {{ $labels.queue }} has been waiting
            more than 5 minutes. See the "Queue Lag" panel on the Awa Job
            Queue (Postgres) dashboard and drill into /queues/{{ $labels.queue }}
            in awa-ui for per-job detail and pause/drain controls.
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: DS_POSTGRES
            model:
              refId: A
              datasource: { type: grafana-postgresql-datasource, uid: DS_POSTGRES }
              rawSql: |
                SELECT
                  now() AS time,
                  queue,
                  EXTRACT(EPOCH FROM (now() - min(run_at)))::float8 AS value
                FROM awa.jobs
                WHERE state = 'available'
                GROUP BY queue
              format: time_series
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              reducer: last
              settings: { mode: dropNN }
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: B
              conditions:
                - type: query
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last, params: [] }
                  evaluator: { type: gt, params: [300] }

      - uid: awa_pg_error_rate_elevated
        title: "awa error rate > 5% for 5m (Postgres)"
        condition: "C"
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          owner: awa
        annotations:
          summary: "Error rate over the last 5 minutes has stayed above 5%"
          description: |
            failed / (completed + failed) over jobs finalised in the last 5
            minutes has been >5% for 5 minutes. See /jobs?state=failed in
            awa-ui.
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: DS_POSTGRES
            model:
              refId: A
              datasource: { type: grafana-postgresql-datasource, uid: DS_POSTGRES }
              rawSql: |
                SELECT
                  now() AS time,
                  COALESCE(
                    (SELECT count(*)::float FROM awa.jobs
                       WHERE state = 'failed' AND finalized_at > now() - interval '5 minutes')
                    / GREATEST(
                      (SELECT count(*)::float FROM awa.jobs
                         WHERE state IN ('completed', 'failed')
                           AND finalized_at > now() - interval '5 minutes'),
                      1
                    ),
                    0
                  ) AS value
              format: time_series
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              reducer: last
              settings: { mode: dropNN }
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: B
              conditions:
                - type: query
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last, params: [] }
                  evaluator: { type: gt, params: [0.05] }

      - uid: awa_pg_no_active_runtime
        title: "awa fleet has no live runtime (Postgres)"
        condition: "C"
        for: 5m
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: critical
          owner: awa
        annotations:
          summary: "No runtime has reported in the last 5 minutes"
          description: |
            Every row in awa.runtime_instances is stale past the
            3×snapshot_interval window. The fleet is either down or has
            lost DB connectivity. Page the on-call.
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: DS_POSTGRES
            model:
              refId: A
              datasource: { type: grafana-postgresql-datasource, uid: DS_POSTGRES }
              rawSql: |
                SELECT
                  now() AS time,
                  count(*)::float AS value
                FROM awa.runtime_instances
                WHERE last_seen_at + make_interval(
                  secs => GREATEST(((GREATEST(snapshot_interval_ms, 1000) / 1000) * 3)::int, 30)
                ) >= now()
              format: time_series
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              reducer: last
              settings: { mode: replaceNN, replaceWithValue: 0 }
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: B
              conditions:
                - type: query
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last, params: [] }
                  evaluator: { type: lt, params: [1] }

      - uid: awa_pg_descriptor_drift_persistent
        title: "awa descriptor drift > 15 minutes (Postgres)"
        condition: "C"
        for: 15m
        noDataState: OK
        execErrState: Error
        labels:
          severity: info
          owner: awa
        annotations:
          summary: "Descriptor drift in the Postgres catalog hasn't cleared within a rollout window"
          description: |
            Two or more live runtimes disagree on a queue or job-kind
            descriptor hash. Brief drift is normal during a rolling
            deploy; persistent drift means two code revisions are running
            simultaneously. See the "Descriptor Health" panel on the
            Postgres dashboard.
        data:
          - refId: A
            relativeTimeRange: { from: 900, to: 0 }
            datasourceUid: DS_POSTGRES
            model:
              refId: A
              datasource: { type: grafana-postgresql-datasource, uid: DS_POSTGRES }
              rawSql: |
                WITH live AS (
                  SELECT * FROM awa.runtime_instances
                  WHERE last_seen_at + make_interval(
                    secs => GREATEST(((GREATEST(snapshot_interval_ms, 1000) / 1000) * 3)::int, 30)
                  ) >= now()
                ),
                qv AS (
                  SELECT d.key AS target, count(DISTINCT d.value) AS n
                  FROM live r
                  CROSS JOIN LATERAL jsonb_each_text(r.queue_descriptor_hashes) AS d(key, value)
                  GROUP BY d.key
                ),
                kv AS (
                  SELECT d.key AS target, count(DISTINCT d.value) AS n
                  FROM live r
                  CROSS JOIN LATERAL jsonb_each_text(r.job_kind_descriptor_hashes) AS d(key, value)
                  GROUP BY d.key
                )
                SELECT now() AS time, count(*)::float AS value
                FROM (
                  SELECT target FROM qv WHERE n > 1
                  UNION ALL
                  SELECT target FROM kv WHERE n > 1
                ) drifts
              format: time_series
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              reducer: last
              settings: { mode: dropNN }
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: B
              conditions:
                - type: query
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last, params: [] }
                  evaluator: { type: gt, params: [0] }
