# Grafana unified-alerting rules for an awa fleet that emits OTLP metrics
# to a Prometheus-compatible datasource. Import via
# `grafana-provisioning/alerting/` or the `/api/v1/provisioning/alert-rules`
# API. All rules fire on steady-state thresholds with a 5m+ "for" window so
# brief spikes don't page.
#
# Datasource UID substitution: before import, replace DS_PROMETHEUS with
# the uid of your Prometheus-compatible datasource (visible in Grafana at
# /datasources). Example:
#   sed 's/DS_PROMETHEUS/prom/' awa-alerts-prometheus.yaml > /tmp/awa.yaml
#
# Rule structure: each rule runs a Prometheus query (refId A), reduces
# every returned series to its latest value (refId B), then either
# thresholds that single value (refId C) or compares it against a second
# query with a math expression. The explicit reduce step is what lets
# Grafana's unified alerting engine handle multi-series queries — without
# it Grafana rejects the evaluation with "frame cannot uniquely be
# identified by its labels".

apiVersion: 1
groups:
  - orgId: 1
    name: awa
    folder: awa
    interval: 1m
    rules:

      - uid: awa_queue_lag_high
        title: "awa queue lag > 5 minutes"
        condition: "C"
        for: 2m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          owner: awa
        annotations:
          summary: "Queue {{ $labels.awa_job_queue }} has jobs waiting >5m"
          description: |
            The oldest `available` job on {{ $labels.awa_job_queue }} has been
            waiting more than 5 minutes — workers aren't keeping up with the
            producer rate. See the "Queue Lag" panel on the Awa Job Queue
            dashboard and drill into /queues/{{ $labels.awa_job_queue }} in
            awa-ui for per-job detail and pause/drain controls.
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: DS_PROMETHEUS
            model:
              refId: A
              datasource: { type: prometheus, uid: DS_PROMETHEUS }
              expr: max by (awa_job_queue) (awa_queue_lag_seconds)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              reducer: last
              settings: { mode: dropNN }
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: B
              conditions:
                - type: query
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last, params: [] }
                  evaluator: { type: gt, params: [300] }

      - uid: awa_error_rate_elevated
        title: "awa error rate > 5% for 5m"
        condition: "C"
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          owner: awa
        annotations:
          summary: "Error rate above 5% over the last 5 minutes"
          description: |
            failed / (completed + failed) has been above 5% for 5 minutes.
            Something systematic is breaking — see the "Error rate" stat on
            the dashboard, then /jobs?state=failed in awa-ui for the
            specific failures.
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: DS_PROMETHEUS
            model:
              refId: A
              datasource: { type: prometheus, uid: DS_PROMETHEUS }
              expr: |
                sum(rate(awa_job_failed_total[5m]))
                  / clamp_min(
                    sum(rate(awa_job_completed_total[5m]))
                      + sum(rate(awa_job_failed_total[5m])),
                    1e-9
                  )
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              reducer: last
              settings: { mode: dropNN }
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: B
              conditions:
                - type: query
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last, params: [] }
                  evaluator: { type: gt, params: [0.05] }

      - uid: awa_rescues_spiking
        title: "awa rescues > 1/s sustained"
        condition: "C"
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          owner: awa
        annotations:
          summary: "Jobs are being rescued faster than 1/s"
          description: |
            Maintenance is rescuing jobs at a sustained rate >1/s. Likely
            causes: worker OOMs or handler deadlocks (heartbeat rescues),
            handlers exceeding job deadline, or external callbacks timing
            out. See "Maintenance Rescues" on the dashboard.
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: DS_PROMETHEUS
            model:
              refId: A
              datasource: { type: prometheus, uid: DS_PROMETHEUS }
              expr: sum(rate(awa_maintenance_rescues_total[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              reducer: last
              settings: { mode: dropNN }
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: B
              conditions:
                - type: query
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last, params: [] }
                  evaluator: { type: gt, params: [1] }

      - uid: awa_no_active_runtime
        title: "awa fleet has no live runtime"
        condition: "C"
        for: 5m
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: critical
          owner: awa
        annotations:
          summary: "No runtime has emitted awa_job_in_flight in the last 5 minutes"
          description: |
            Every worker in the fleet has either stopped exporting metrics
            or is down. See the "Active runtimes" stat on the dashboard
            and /runtime in awa-ui. Page the on-call for awa.
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: DS_PROMETHEUS
            model:
              refId: A
              datasource: { type: prometheus, uid: DS_PROMETHEUS }
              expr: count(count by (service_name, instance) (awa_job_in_flight))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              reducer: last
              settings: { mode: replaceNN, replaceWithValue: 0 }
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: B
              conditions:
                - type: query
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last, params: [] }
                  evaluator: { type: lt, params: [1] }

      - uid: awa_storage_prepared_blocked
        title: "awa storage transition prepared but blocked"
        condition: "C"
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          owner: awa
        annotations:
          summary: "Storage transition is prepared but cannot enter mixed transition"
          description: |
            The fleet is in `prepared`, but `enter_mixed_transition` has been
            blocked for 10 minutes. Common causes are live canonical-only
            runtimes still reporting, no queue-storage target runtime, or the
            prepared schema not being ready. Check /runtime in awa-ui or the
            "Storage transition" section on the dashboard.
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: DS_PROMETHEUS
            model:
              refId: A
              datasource: { type: prometheus, uid: DS_PROMETHEUS }
              expr: |
                max(awa_storage_state{awa_storage_state="prepared"})
                  * (1 - max(awa_storage_transition_ready{awa_storage_action="enter_mixed_transition"}))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              reducer: last
              settings: { mode: replaceNN, replaceWithValue: 0 }
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: B
              conditions:
                - type: query
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last, params: [] }
                  evaluator: { type: gt, params: [0.5] }

      - uid: awa_storage_finalize_blocked
        title: "awa storage mixed transition blocked from finalize"
        condition: "C"
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          owner: awa
        annotations:
          summary: "Storage transition is in mixed_transition but cannot finalize"
          description: |
            The fleet is routing to queue storage, but finalization has been
            blocked for 10 minutes. Canonical backlog may still be draining or
            canonical/canonical_drain runtimes may still be live. Check
            /runtime in awa-ui or the "Storage transition" section on the
            dashboard.
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: DS_PROMETHEUS
            model:
              refId: A
              datasource: { type: prometheus, uid: DS_PROMETHEUS }
              expr: |
                max(awa_storage_state{awa_storage_state="mixed_transition"})
                  * (1 - max(awa_storage_transition_ready{awa_storage_action="finalize"}))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              reducer: last
              settings: { mode: replaceNN, replaceWithValue: 0 }
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: B
              conditions:
                - type: query
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last, params: [] }
                  evaluator: { type: gt, params: [0.5] }

      - uid: awa_throughput_collapsed
        title: "awa completion throughput dropped below 10% of baseline"
        condition: "D"
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          owner: awa
        annotations:
          summary: "Completion rate has collapsed vs the 1-hour baseline"
          description: |
            Completion rate over the last 5 minutes is <10% of the 1-hour
            baseline. Unlike "error rate", this catches silent stalls
            (deadlock, worker pool exhausted, all producers offline) that
            don't surface as failures. Correlate with "Queue Lag" and
            "Active runtimes" — one of those usually explains it.
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: DS_PROMETHEUS
            model:
              refId: A
              datasource: { type: prometheus, uid: DS_PROMETHEUS }
              expr: sum(rate(awa_job_completed_total[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              reducer: last
              settings: { mode: replaceNN, replaceWithValue: 0 }
          - refId: C
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: DS_PROMETHEUS
            model:
              refId: C
              datasource: { type: prometheus, uid: DS_PROMETHEUS }
              expr: clamp_min(sum(rate(awa_job_completed_total[1h])), 0.01)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: D
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: D
              type: math
              datasource: { type: __expr__, uid: __expr__ }
              expression: $B < ($C * 0.1)

      - uid: awa_descriptor_drift_persistent
        title: "awa descriptor drift lasting > 15 minutes"
        condition: "C"
        for: 15m
        noDataState: OK
        execErrState: Error
        labels:
          severity: info
          owner: awa
        annotations:
          summary: "Descriptor drift hasn't cleared within 15 minutes of rollout window"
          description: |
            Two or more live runtimes are reporting different BLAKE3 hashes
            for the same queue / kind descriptor. Brief drift is normal
            during a rolling deploy; persistent drift means two code
            revisions are running simultaneously. See the "Descriptor
            Health" panel on the Postgres dashboard or /runtime in awa-ui.
        data:
          - refId: A
            relativeTimeRange: { from: 900, to: 0 }
            datasourceUid: DS_PROMETHEUS
            model:
              refId: A
              datasource: { type: prometheus, uid: DS_PROMETHEUS }
              # For each queue/kind, count distinct descriptor attribute
              # tuples across live info-gauge series. >1 means two runtimes
              # disagree on that target.
              expr: |
                max(
                  count by (awa_job_queue) (count by (awa_job_queue, awa_queue_display_name, awa_queue_owner, awa_queue_tags) (awa_queue_info))
                  or
                  count by (awa_job_kind) (count by (awa_job_kind, awa_job_kind_display_name, awa_job_kind_owner, awa_job_kind_tags) (awa_job_kind_info))
                )
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              reducer: last
              settings: { mode: dropNN }
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: B
              conditions:
                - type: query
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last, params: [] }
                  evaluator: { type: gt, params: [1] }
