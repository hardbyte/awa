name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/awa_test

jobs:
  # ─── Rust ───────────────────────────────────────────────
  rust-lint:
    name: Rust lint (fmt + clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  rust-build:
    name: Rust build
    needs: [rust-lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - name: cargo build
        run: cargo build --workspace

  rust-test:
    name: Rust tests
    needs: [rust-build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: awa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - name: Wait for Postgres
        run: until pg_isready -h localhost -p 5432; do sleep 1; done
      - name: Run tests
        run: cargo test --workspace
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/awa_test

  # ─── Rust bridge (tokio-postgres) ──────────────────────
  rust-bridge-tokio-pg:
    name: Rust bridge (tokio-postgres)
    needs: [rust-lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: awa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - name: Wait for Postgres
        run: until pg_isready -h localhost -p 5432; do sleep 1; done
      - name: Run bridge tests (awa-model)
        run: cargo test --package awa-model --features tokio-postgres --test bridge_tokio_pg_test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/awa_test
      - name: Verify facade re-export compiles
        run: cargo check --package awa --features tokio-postgres
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/awa_test

  # ─── Python (awa-python) ────────────────────────────────
  python-build-test:
    name: Python build + test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: awa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: awa-python
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "awa-python -> awa-python/target"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Create venv and install deps
        run: |
          uv venv .venv
          uv pip install maturin pytest pytest-asyncio asyncpg django greenlet psycopg psycopg-binary sqlalchemy
      - name: Build extension (maturin develop)
        run: .venv/bin/maturin develop
      - name: Wait for Postgres
        run: until pg_isready -h localhost -p 5432; do sleep 1; done
      - name: Run Python tests
        run: .venv/bin/pytest tests/ -v -m "not chaos"
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/awa_test
      - name: Run Python chaos recovery test
        run: .venv/bin/pytest tests/test_chaos_recovery.py -v -m chaos
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/awa_test
      - name: Run Python examples (README drift detection)
        run: |
          .venv/bin/python examples/quickstart.py
          .venv/bin/python examples/sync_api.py
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/awa_test
  # ─── Frontend ──────────────────────────────────────────
  frontend-lint:
    name: Frontend lint + typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: awa-ui/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npx vitest run
      - name: Build
        run: npm run build

  frontend-e2e:
    name: Frontend E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/awa_test
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: awa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: awa-ui/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Build CLI (with embedded frontend)
        run: cargo build -p awa-cli
        working-directory: .
      - name: Wait for Postgres
        run: until pg_isready -h localhost -p 5432; do sleep 1; done
        working-directory: .
      - name: Run migrations
        run: ../../target/debug/awa --database-url $DATABASE_URL migrate
      - name: Install Playwright browsers
        run: npx playwright install chromium
      - name: Run E2E tests
        run: npx playwright test

  # ─── PyO3 Spike ─────────────────────────────────────────
  pyo3-spike:
    name: PyO3 async bridge spike
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: spike/pyo3-async
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "spike/pyo3-async -> spike/pyo3-async/target"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Create venv and install deps
        run: |
          uv venv .venv
          uv pip install maturin pytest pytest-asyncio
      - name: Build extension
        run: .venv/bin/maturin develop
      - name: Run spike tests
        run: .venv/bin/pytest test_spike.py -v

  # ─── CLI wheel build test ───────────────────────────────
  cli-wheel-build:
    name: CLI wheel build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build CLI wheel (maturin)
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist --manifest-path awa-cli/Cargo.toml
          before-script-linux: |
            apt-get update && apt-get install -y libpq-dev || true
      - name: Verify wheel contents
        run: |
          pip install dist/*.whl
          awa --help

  # ─── CLI smoke test ─────────────────────────────────────
  cli-smoke:
    name: CLI smoke test
    needs: [rust-build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: awa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - name: Build CLI
        run: cargo build -p awa-cli
      - name: Wait for Postgres
        run: until pg_isready -h localhost -p 5432; do sleep 1; done
      - name: Run migrations via CLI
        run: ./target/debug/awa --database-url postgres://postgres:postgres@localhost:5432/awa_test migrate
      - name: List jobs (empty)
        run: ./target/debug/awa --database-url postgres://postgres:postgres@localhost:5432/awa_test job list
      - name: Queue stats (empty)
        run: ./target/debug/awa --database-url postgres://postgres:postgres@localhost:5432/awa_test queue stats
      - name: Serve smoke test
        run: |
          ./target/debug/awa --database-url postgres://postgres:postgres@localhost:5432/awa_test serve &
          SERVER_PID=$!
          sleep 2
          curl -sf http://127.0.0.1:3000/api/stats
          kill $SERVER_PID
      - name: Run Rust ETL example
        run: cargo run -p awa --example etl_pipeline
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/awa_test

  # ─── Chaos smoke test ─────────────────────────────────────────
  # Lightweight version of the nightly chaos suite — catches Python
  # interop regressions (e.g., wrong client class) on every PR without
  # the full benchmark/soak overhead.
  chaos-smoke:
    name: Chaos smoke (mixed Rust + Python)
    needs: [rust-build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: awa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Create Python venv for mixed-fleet test
        run: |
          python -m venv awa-python/.venv
          awa-python/.venv/bin/pip install --upgrade pip maturin
      - name: Build Python extension
        run: cd awa-python && .venv/bin/maturin develop
      - name: Wait for Postgres
        run: until pg_isready -h localhost -p 5432; do sleep 1; done
      - name: Run mixed Rust + Python worker smoke test
        run: |
          export AWA_PYTHON_BIN="$PWD/awa-python/.venv/bin/python"
          cargo test --package awa --test chaos_suite_test \
            test_mixed_rust_and_python_workers_share_same_queue \
            -- --exact --ignored --nocapture
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/awa_test

  # ─── Telemetry validation ─────────────────────────────────────
  telemetry-validation:
    name: Telemetry OTLP validation
    needs: [rust-build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: awa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      otel-lgtm:
        image: grafana/otel-lgtm:0.22.0
        ports:
          - 4317:4317
          - 4318:4318
          - 9090:9090
        options: >-
          --health-cmd "cat /tmp/ready"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - name: Wait for Postgres
        run: until pg_isready -h localhost -p 5432; do sleep 1; done
      - name: Wait for OTLP collector
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:9090/api/v1/status/runtimeinfo && break
            echo "Waiting for Prometheus... ($i)"
            sleep 2
          done
      - name: Run telemetry integration test
        run: cargo test -p awa --test telemetry_test -- --ignored --nocapture
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/awa_test
          OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4317
          PROMETHEUS_URL: http://localhost:9090
