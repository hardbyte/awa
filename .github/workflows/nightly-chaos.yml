name: Nightly Chaos And Benchmarks

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/awa_test

jobs:
  postgres-failover-smoke:
    name: Postgres failover smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - name: Show Docker versions
        run: |
          docker --version
          docker compose version
      - name: Run Postgres failover smoke test
        run: cargo test --package awa --test postgres_failover_smoke_test -- --ignored --nocapture

  rust-nightly:
    name: Rust nightly benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: awa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Create Python venv for Rust chaos suite
        run: |
          python -m venv awa-python/.venv
          awa-python/.venv/bin/pip install --upgrade pip maturin
      - name: Build Python extension for mixed-fleet chaos test
        run: |
          cd awa-python
          .venv/bin/maturin develop
      - name: Wait for Postgres
        run: until pg_isready -h localhost -p 5432; do sleep 1; done
      - name: Create artifact directory
        run: mkdir -p artifacts/nightly
      - name: Run sustained hot-path benchmark
        run: |
          set -o pipefail
          cargo test --package awa --test scheduling_benchmark_test \
            test_runtime_sustained_hot_path -- --exact --ignored --nocapture \
            | tee artifacts/nightly/rust-hot.txt
      - name: Run Rust chaos suite
        run: |
          set -o pipefail
          export AWA_PYTHON_BIN="$PWD/awa-python/.venv/bin/python"
          cargo test --package awa --test chaos_suite_test \
            -- --ignored --test-threads=1 --nocapture \
            | tee artifacts/nightly/rust-chaos.txt
      - name: Run sustained deferred benchmark
        run: |
          set -o pipefail
          cargo test --package awa --test scheduling_benchmark_test \
            test_scheduled_steady_2m_due_4k_per_sec -- --exact --ignored --nocapture \
            | tee artifacts/nightly/rust-scheduled-2m-4k.txt
      - name: Run failure-mode benchmark matrix
        run: |
          set -o pipefail
          cargo test --package awa --test failure_benchmark_test \
            test_failure_bench_full_matrix -- --exact --ignored --nocapture \
            | tee artifacts/nightly/rust-failure-matrix.txt
      - name: Run stale-heartbeat rescue benchmark
        run: |
          set -o pipefail
          cargo test --package awa --test failure_benchmark_test \
            test_failure_bench_stale_heartbeat_rescue -- --exact --ignored --nocapture \
            | tee artifacts/nightly/rust-stale-rescue.txt
      - name: Check for regressions
        if: always()
        run: python .github/scripts/check-bench-regression.py artifacts/nightly benchmarks/baseline.json
      - name: Upload Rust nightly artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-rust
          path: artifacts/nightly/

  python-nightly:
    name: Python nightly chaos and benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: awa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        shell: bash
        working-directory: awa-python
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "awa-python -> awa-python/target"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Create venv and install deps
        run: |
          uv venv .venv
          uv pip install maturin pytest pytest-asyncio
      - name: Build extension (maturin develop)
        run: .venv/bin/maturin develop
      - name: Wait for Postgres
        run: until pg_isready -h localhost -p 5432; do sleep 1; done
      - name: Create artifact directory
        run: mkdir -p artifacts/nightly
      - name: Run Python chaos recovery test
        run: |
          set -o pipefail
          .venv/bin/pytest tests/test_chaos_recovery.py -v -m chaos \
            | tee artifacts/nightly/python-chaos.txt
      - name: Run Python baseline benchmarks
        run: |
          set -o pipefail
          PYTHONPATH=scripts .venv/bin/python scripts/benchmark_runtime.py --scenario baseline \
            | tee artifacts/nightly/python-benchmarks.txt
      - name: Run Python worker benchmarks (sweep, jitter, rescue)
        run: |
          set -o pipefail
          PYTHONPATH=scripts .venv/bin/python scripts/benchmark_runtime.py --scenario workers \
            --hot-total-jobs 50000 --jitter-total-due 2000 --rescue-total-jobs 500 \
            | tee artifacts/nightly/python-worker-benchmarks.txt
      - name: Run Python failure-mode benchmarks
        run: |
          set -o pipefail
          PYTHONPATH=scripts .venv/bin/python scripts/benchmark_runtime.py --scenario failures \
            --failure-total-jobs 2000 --max-connections 10 \
            | tee artifacts/nightly/python-failure-benchmarks.txt
      - name: Check for regressions
        if: always()
        working-directory: .
        run: python .github/scripts/check-bench-regression.py awa-python/artifacts/nightly benchmarks/baseline.json
      - name: Upload Python nightly artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-python
          path: awa-python/artifacts/nightly/

  # ─── Notify on failure ───────────────────────────────────
  notify-failure:
    name: Create issue on failure
    needs: [postgres-failover-smoke, rust-nightly, python-nightly]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Build issue body
        id: body
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          cat <<EOF > issue_body.md
          Nightly run failed on $(date -u +%Y-%m-%d).

          **Failed jobs:**
          - postgres-failover-smoke: ${{ needs.postgres-failover-smoke.result }}
          - rust-nightly: ${{ needs.rust-nightly.result }}
          - python-nightly: ${{ needs.python-nightly.result }}

          [View run](${RUN_URL})
          EOF
      - name: Create or update issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check for an existing open nightly-failure issue
          EXISTING=$(gh issue list --label nightly-failure --state open --limit 1 --json number --jq '.[0].number // empty')
          TITLE="Nightly chaos/benchmark failure ($(date -u +%Y-%m-%d))"
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body-file issue_body.md
          else
            gh issue create \
              --title "$TITLE" \
              --body-file issue_body.md \
              --label nightly-failure
          fi
