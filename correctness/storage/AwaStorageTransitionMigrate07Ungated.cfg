\* Expected-counterexample witness for the 0.7 migrate gate (#370 /
\* ADR-037). With GateMigrate07 = FALSE the Migrate07 action fires without
\* checking the finalized-or-fresh gate, so TLC finds a state where the 0.7
\* migration has landed while canonical work exists or a canonical-capable
\* runtime is live — violating Migrate07OnlyOnQuiescedCanonical. The
\* production gate (`check_storage_finalized_gate` in
\* `awa-model/src/migrations.rs`) closes exactly this hole; the passing
\* configuration is AwaStorageTransition.cfg (GateMigrate07 = TRUE).
CONSTANTS
  MaxCanonicalBacklog = 1
  MaxQueueRows = 1
  RequireQueueExecutorOnEnter = TRUE
  GateMigrate07 = FALSE

SPECIFICATION Spec

INVARIANTS
  TypeOK
  Migrate07OnlyOnQuiescedCanonical
