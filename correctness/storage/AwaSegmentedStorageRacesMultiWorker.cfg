\* Safe-commit config with three workers to exercise lease-segment races
\* under higher claimant contention. Expected to pass all invariants.
CONSTANTS
  Jobs = {"j1"}
  Workers = {"w1", "w2", "w3"}
  ReadySegmentCount = 2
  LeaseSegmentCount = 2
  MaxRunLease = 2
  MaxAppendSeq = 2

SPECIFICATION SpecSafe

INVARIANTS
  TypeOK
  OneOpenLeaseSegment
  LeaseCursorIsOpen
  ActiveLeasesSubsetReadyEntries
  PrunedLeaseSegmentsAreEmpty
  TaskLeaseBounded
