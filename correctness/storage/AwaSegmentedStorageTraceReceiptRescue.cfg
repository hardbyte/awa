\* Receipt-rescue trace validation. TLC should report
\* "Invariant ReceiptRescueTraceIncomplete is violated" when the trace
\* reaches Len(ReceiptRescueTrace) = 3.
CONSTANTS
  Jobs = {"j1"}
  Workers = {"w1"}
  ReadySegmentCount = 2
  LeaseSegmentCount = 2
  TerminalSegmentCount = 2
  ClaimSegmentCount = 2
  MaxRunLease = 2
  MaxAppendSeq = 2

SPECIFICATION SpecReceiptRescue

INVARIANTS
  TypeOK
  ActiveLeasesSubsetReadyEntries
  AttemptStateRequiresLiveLease
  FreshHeartbeatRequiresLease
  ProgressRequiresAttemptState
  TerminalHasNoLiveRuntime
  DlqHasNoLiveRuntime
  DlqAndTerminalDisjoint
  DeferredHasNoLiveRuntime
  WaitingIsLeaseState
  ReadyEntriesHaveLaneSeq
  DeferredEntriesClearLaneSeq
  ReadyLaneSeqUnique
  ClaimCursorBounded
  NoLostClaim
  ClaimOpenAndClosedDisjoint
  LaneStateConsistent
  TaskLeaseBounded
  ReceiptRescueTraceIncomplete
