\* Snooze-trace validation. TLC should report
\* "Invariant SnoozeTraceIncomplete is violated" — this is the
\* positive witness that the trace was fully consumed (traceIdx reached
\* Len(SnoozeTrace) = 6). All inherited safety invariants must hold
\* throughout.
CONSTANTS
  Jobs = {"j1"}
  Workers = {"w1"}
  ReadySegmentCount = 2
  LeaseSegmentCount = 2
  TerminalSegmentCount = 2
  ClaimSegmentCount = 2
  MaxRunLease = 2
  MaxAppendSeq = 2

SPECIFICATION SpecSnooze

INVARIANTS
  TypeOK
  ActiveLeasesSubsetReadyEntries
  AttemptStateRequiresLiveLease
  FreshHeartbeatRequiresLease
  ProgressRequiresAttemptState
  TerminalHasNoLiveRuntime
  DlqHasNoLiveRuntime
  DlqAndTerminalDisjoint
  DeferredHasNoLiveRuntime
  WaitingIsLeaseState
  ReadyEntriesHaveLaneSeq
  DeferredEntriesClearLaneSeq
  ReadyLaneSeqUnique
  ClaimCursorBounded
  NoLostClaim
  ClaimOpenAndClosedDisjoint
  LaneStateConsistent
  TaskLeaseBounded
  SnoozeTraceIncomplete
