\* Safe-commit config: uses CommitClaimChecked which re-reads the lease
\* and claim segment state at commit time. Expected to pass all invariants.
\*
\* Note: ActiveLeasesInOpenSegmentsOnly is too strict in general — a
\* lease can legitimately be in a "sealed" segment while it drains. Only
\* "pruned" is a correctness violation.
CONSTANTS
  Jobs = {"j1"}
  Workers = {"w1", "w2"}
  ReadySegmentCount = 2
  LeaseSegmentCount = 2
  ClaimSegmentCount = 2
  MaxRunLease = 2
  MaxAppendSeq = 2

SPECIFICATION SpecSafe

INVARIANTS
  TypeOK
  OneOpenLeaseSegment
  OneOpenClaimSegment
  LeaseCursorIsOpen
  ClaimCursorIsOpen
  ActiveLeasesSubsetReadyEntries
  PrunedLeaseSegmentsAreEmpty
  PrunedClaimSegmentsAreEmpty
  TaskLeaseBounded
