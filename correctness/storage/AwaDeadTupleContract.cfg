\* Architectural-contract check for dead-tuple accumulation.
\*
\* This is a static-shape spec — no constants to override, no state
\* to explore. TLC just evaluates each invariant against the single
\* reachable state and reports any that don't hold.
\*
\* Expected outcome: clean run, all invariants satisfied. Any
\* failure means either the schema in queue_storage.rs has gained a
\* table that violates the architectural contract, or a transaction
\* has gained a mutation that violates the table's reclaim kind.
\* See the spec preamble for what each invariant catches.

SPECIFICATION Spec

\* No INVARIANTS clause — the four contract checks are ASSUMEs
\* in the spec, evaluated by TLC during semantic analysis.
