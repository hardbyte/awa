\* Expected-counterexample witness for the pre-#388 behavior: the batched
\* rescue statement is enabled only when every stale row can transition, so
\* the unique-claim conflict on one row blocks it permanently and the
\* innocent stuck job starves. TLC reports Convergence violated.
CONSTANTS
  PerRowFallback = FALSE

SPECIFICATION Spec

INVARIANTS
  TypeOK
  ClaimConsistency

PROPERTIES
  Convergence
