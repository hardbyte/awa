\* Deadlock-detector sanity harness. Uses a deliberately cycle-creating
\* pair of plans (CycleA takes LeaseRingState then QueueRingState,
\* CycleB takes them in the opposite order). TLC is expected to flag
\* NoDeadlock with a counterexample trace — if it passes, the detector
\* is broken and the main spec's "no deadlock" result cannot be trusted.
CONSTANTS
  TxIds = {"t1", "t2"}
  Queues = {"q1"}
  Priorities = {1}
  LeaseSlots = {1}
  ReadySlots = {1}

SPECIFICATION SpecDeadlockDemo

INVARIANTS
  TypeOK
  LockCompatibility
  HeldOnlyByRunningTxs
  NoDeadlock
