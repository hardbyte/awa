\* Historical witness for the *pre-fix* SQL-level gate that only checked
\* `runtime_instances.storage_capability = 'queue_storage'`.
\*
\* An auto queue-storage-capable runtime started before mixed transition
\* reports `queue_storage` while prepared, so the old gate accepted it.
\* After mixed transition it became canonical-drain-only because its
\* effective storage was resolved at startup, leaving the system in
\* mixed_transition with no queue executor.
\*
\* As of v014_storage_transition_role.sql the production SQL gate now
\* requires `transition_role = 'queue_storage_target'`, matching
\* `AwaStorageTransition.cfg` (RequireQueueExecutorOnEnter = TRUE). This
\* config is retained as a TLC-checkable reproducer of the historical
\* shape; the invariant `MixedHasQueueExecutor` should fail under
\* `RequireQueueExecutorOnEnter = FALSE`, demonstrating why the fix is
\* needed.
CONSTANTS
  MaxCanonicalBacklog = 1
  MaxQueueRows = 1
  RequireQueueExecutorOnEnter = FALSE

SPECIFICATION Spec

INVARIANTS
  TypeOK
  PreparedRequiresEngine
  ActiveImpliesQueueStorageCurrent
  CanonicalAndPreparedRouteCanonical
  MixedAndActiveRouteQueueStorage
  NoMixedWithCanonicalOnlyRuntime
  FinalizeOnlyAfterDrain
  FinalizeOnlyAfterNoDrainRuntimes
  MixedHasQueueExecutor
