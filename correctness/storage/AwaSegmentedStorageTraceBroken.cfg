\* Broken-trace rejection. TLC is expected to report:
\* "Deadlock reached" at traceIdx = 2. That's the proof the checker
\* catches invalid traces — the third event (PromoteDeferred) has no
\* corresponding enabled base spec action because the job is not in
\* deferredEntries at that point.
\*
\* SHOULD NOT report "SnoozeTraceIncomplete violated" (wrong trace) or
\* "BrokenTraceIncomplete violated" (trace was NOT fully consumed). A
\* clean "Deadlock" report at a small state count is the expected
\* outcome.
CONSTANTS
  Jobs = {"j1"}
  Workers = {"w1"}
  ReadySegmentCount = 2
  LeaseSegmentCount = 2
  TerminalSegmentCount = 2
  ClaimSegmentCount = 2
  MaxRunLease = 2
  MaxAppendSeq = 2

SPECIFICATION SpecBroken

INVARIANTS
  TypeOK
  ActiveLeasesSubsetReadyEntries
  AttemptStateRequiresLiveLease
  FreshHeartbeatRequiresLease
  ProgressRequiresAttemptState
  TerminalHasNoLiveRuntime
  DlqHasNoLiveRuntime
  DlqAndTerminalDisjoint
  DeferredHasNoLiveRuntime
  WaitingIsLeaseState
  ReadyEntriesHaveLaneSeq
  DeferredEntriesClearLaneSeq
  ReadyLaneSeqUnique
  ClaimCursorBounded
  NoLostClaim
  ClaimOpenAndClosedDisjoint
  LaneStateConsistent
  TaskLeaseBounded
