\* Safety checking with Postgres row-lock semantics.
\* Verifies at-most-once resolution under concurrent lock acquisition,
\* blocking re-evaluation, SKIP LOCKED behavior, and sequential callback
\* resume transitions.
SPECIFICATION Spec

INVARIANTS
  TypeOK
  AtMostOnceResolution
  TerminalClearsCallback
  WaitingHasCallback
  IdleHasNoOwner
  ActiveHasOwner
  LockHolderConsistent
  BlockedNotSelfLocked
  CallbackGenBounded
  ResumePreservesOwner
